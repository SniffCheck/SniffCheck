
ssid_rules:
  - ssid_pattern: "^Starbucks WiFi$"
    expected_vendors:
      - "Cisco Systems"
      - "Aruba Networks"
      - "Hewlett Packard Enterprise"
      - "Meraki"
    region: global
    notes: "Starbucks contracts AT&T; APs are Cisco/Aruba/Meraki"

  - ssid_pattern: "^attwifi$|^att-wifi$"
    expected_vendors:
      - "Pace Americas"
      - "Arris"
      - "Cisco"
    region: us

  - ssid_pattern: "^xfinitywifi$|^XFINITY$"
    expected_vendors:
      - "Cisco"
      - "Arris"
      - "Comcast Cable"
    region: us

  - ssid_pattern: "^Google Starbucks$"
    expected_vendors:
      - "Cisco"
      - "Meraki"
    notes: "Legacy Google partnership SSID, may still be live"

  - ssid_pattern: "^.+_Guest$|^.+ Guest$"
    expected_vendors:
      - "Cisco"
      - "Aruba"
      - "Ruckus"
      - "Ubiquiti"
    notes: "Generic enterprise guest networks"

  - ssid_pattern: "^Boingo.*$|^boingo.*$"
    expected_vendors:
      - "Cisco"
      - "Aruba"
      - "Ruckus"
    notes: "Boingo airport/venue Wi-Fi"

  - ssid_pattern: "^TWC.*WiFi$|^SpectrumWiFi.*$"
    expected_vendors:
      - "Cisco"
      - "Arris"
      - "Casa Systems"
    region: us

  - ssid_pattern: "^_The UPS Store.*$"
    expected_vendors:
      - "Cisco"
      - "Meraki"
    region: us

  - ssid_pattern: "^McDonald's.*$|^McDonalds.*$"
    expected_vendors:
      - "Cisco"
      - "Aruba"
      - "Meraki"
    region: global

  - ssid_pattern: "^airport.*$|^Airport.*$|^.*_airport$"
    expected_vendors:
      - "Cisco"
      - "Aruba"
      - "Ruckus"
      - "Boingo"
    notes: "Airport networks typically enterprise grade"

