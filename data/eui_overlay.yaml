# ── Rogue-AP hardware platforms (evidence tier, NOT a verdict) ──────────
# OUIs commonly used to *build* rogue-AP / pentest rigs. Presence is
# EVIDENCE, never a conviction: a Raspberry Pi or ALFA adapter is legitimate,
# general-purpose hardware that vastly more often runs Pi-hole, Home
# Assistant, a media box or a research laptop than an attack. These get the
# soft ROGUE-HW? class (no F_MALICIOUS) and surface as a device-identity fact
# plus an evidence note; they only escalate when corroborated by observed
# behavior (twin / KARMA / deauth / open-clone). Hak5 owns no IEEE OUI of its
# own — its gear rides on third-party radios and spoofed MACs — so none of
# these prefixes identify "a Hak5"; at most they identify the build platform.
# `name` overrides the IEEE vendor string for display where it clarifies.
rogue_hw_prefixes:
  - prefix: "00:13:37"
    name: "Orient Power (00:13:37 — also Wi-Fi Pineapple default-spoof MAC)"
    notes: "IEEE-assigned to Orient Power Home Network Ltd; 00:13:37 is a 'leet' MAC the Pineapple spoofs by default, so a match is either Orient Power gear or a spoof"
  - prefix: "00:C0:CA"
    name: "ALFA Network adapter"
    notes: "IEEE-assigned to ALFA, INC.; ubiquitous USB Wi-Fi NIC on pentest rigs and legitimate research alike"
  - prefix: "28:CD:C1"
    name: "Raspberry Pi (Trading) Ltd"
    notes: "Raspberry Pi OUI — was previously mislabeled 'Hak5 Pineapple Tetra'"
  - prefix: "DC:A6:32"
    notes: "Raspberry Pi Trading Ltd — 3B/3B+/4"
  - prefix: "B8:27:EB"
    notes: "Raspberry Pi Foundation — original OUI"
  - prefix: "E4:5F:01"
    notes: "Raspberry Pi Trading Ltd — 4 / Zero 2W alt OUI"
  - prefix: "D8:3A:DD"
    notes: "Raspberry Pi Trading Ltd — 4 / CM4 / 400 OUI"
  - prefix: "2C:CF:67"
    notes: "Raspberry Pi (Trading) Ltd — Pi 5 OUI"

# Genuinely-malicious OUIs → hard block (EUI_FLAG_KNOWN_MALICIOUS). Empty by
# design: no vendor currently ships hardware whose OUI *alone* proves hostile
# intent. Add an entry only for an OUI uniquely assigned to attack hardware,
# never a general-purpose build platform (see rogue_hw_prefixes above).
malicious_prefixes: []
